# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: build

on:
  push:
    branches:
      - master
      - 0.1.0
    tags:
      - '*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: [3.12]
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install metaeuk
      run: |
        wget https://mmseqs.com/metaeuk/metaeuk-linux-avx2.tar.gz
        tar -xzf metaeuk-linux-avx2.tar.gz
        sudo mv metaeuk/bin/metaeuk /usr/local/bin/
    - name: Install miniprot
      run: |
        git clone --depth 1 https://github.com/lh3/miniprot
        make -C miniprot
        sudo cp miniprot/miniprot /usr/local/bin/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest wheel
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test
      run: |
        pwd
        pip install .
        sudo apt-get update
        path=$(fdog.setup -d ./ --getSourcepath); xargs -a $path/data/dependencies.txt sudo apt-get install -y -qq
        echo "######### current dir #########"
        pwd
        ls
        bash scripts/run_tests.sh
  conda-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: fdog-env
          create-args: >-
            python=3.12
          cache-environment: true
          cache-downloads: true
          init-shell: bash
      - name: Run tests (conda env)
        shell: bash -l {0}
        run: |
          pip install .
          bash scripts/run_tests.sh
  deploy:
    needs: [build, conda-test]
    runs-on: ubuntu-22.04
    if: startsWith(github.event.ref, 'refs/tags')
    steps:
      - uses: actions/checkout@v2
      - uses: casperdcl/deploy-pypi@v2
        with:
          password: ${{ secrets.pypi }}
          build: true
          upload: ${{ github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags') }}
